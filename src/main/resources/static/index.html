<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGCSS - Panel de Solicitudes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <header>
        <h1>MGCSS - Gestión de Servicio Técnico</h1>
        <p>Control de solicitudes de un Servicio Técnico en tiempo real</p>
    </header>

    <div class="actions-bar">
        <button id="btnCrear" class="btn-primary" onclick="crearSolicitud()"><span>+</span> Nueva Solicitud</button>
        <button id="btnRefrescar" onclick="cargarSolicitudes()">🔄 Actualizar Lista</button>
    </div>

    <div id="notificacion" class="notificacion hidden"></div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Estado</th>
                    <th>Fecha Creación</th>
                    <th>Técnico</th>
                    <th>Acciones de Gestión</th>
                </tr>
            </thead>
            <tbody id="tablaSolicitudes">
                
            </tbody>
        </table>
    </div>
</div>

<script src="javascript.js"></script>
</body>
</html>
